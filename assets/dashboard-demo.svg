  <text class="t" x="760" y="142" fill="#e6edf3">Opus</text>
  <text class="t" x="836" y="142" fill="#4ade80">$0.32</text>
  <line x1="452" y1="149" x2="860" y2="149" stroke="#8b949e" stroke-width="0.5"/>

