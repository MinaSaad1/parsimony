<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
  <defs>
    <style>
      .t { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
      .cyan { fill: #22d3ee; }
      .green { fill: #4ade80; }
      .magenta { fill: #e879f9; }
      .yellow { fill: #facc15; }
      .white { fill: #e6edf3; }
      .dim { fill: #8b949e; }
      .red { fill: #f87171; }
      .blue { fill: #60a5fa; }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect width="100%" height="100%" fill="#0d1117" rx="10"/>

  <!-- Title bar -->
  <rect width="100%" height="32" fill="#161b22" rx="10"/>
  <rect y="22" width="100%" height="10" fill="#161b22"/>
  <circle cx="18" cy="16" r="6" fill="#f85149"/>
  <circle cx="38" cy="16" r="6" fill="#f0c74f"/>
  <circle cx="58" cy="16" r="6" fill="#3fb950"/>
  <text class="t dim" x="280" y="20" text-anchor="middle">parsimony</text>

  <!-- Command -->
  <text class="t dim" x="20" y="58">$</text>
  <text class="t green" x="35" y="58">parsimony</text>

  <!-- Title line -->
  <text class="t dim" x="110" y="82">------</text>
  <text class="t magenta" x="165" y="82">Parsimony | Wednesday, Mar 25 2026</text>
  <text class="t dim" x="450" y="82">------</text>

  <!-- Summary -->
  <text class="t white" x="30" y="106">Total Cost:</text>
  <text class="t green" x="130" y="106">$2.19</text>
  <text class="t white" x="195" y="106">Sessions:</text>
  <text class="t cyan" x="280" y="106">3</text>
  <text class="t white" x="310" y="106">API Calls:</text>
  <text class="t cyan" x="405" y="106">7</text>

  <!-- By Model header -->
  <text class="t white" x="160" y="136" font-weight="bold">By Model</text>

  <!-- Model table header -->
  <text class="t dim" x="30" y="158">+--------------+--------+-------+-------+</text>
  <text class="t blue" x="30" y="174">  Model</text>
  <text class="t blue" x="175" y="174">Tokens</text>
  <text class="t blue" x="250" y="174">Cost</text>
  <text class="t blue" x="320" y="174">Share</text>
  <text class="t dim" x="30" y="190">+--------------+--------+-------+-------+</text>

  <!-- Model row -->
  <text class="t white" x="30" y="206">  Opus 4.6</text>
  <text class="t yellow" x="168" y="206">319.7K</text>
  <text class="t green" x="248" y="206">$2.19</text>
  <text class="t cyan" x="315" y="206">100.0%</text>
  <text class="t dim" x="30" y="222">+--------------+--------+-------+-------+</text>

  <!-- By Tool header -->
  <text class="t white" x="170" y="250" font-weight="bold">By Tool</text>

  <!-- Tool table -->
  <text class="t dim" x="30" y="268">+------------+-------+---------+</text>
  <text class="t blue" x="30" y="284">  Tool</text>
  <text class="t blue" x="175" y="284">Calls</text>
  <text class="t blue" x="248" y="284">Type</text>
  <text class="t dim" x="30" y="300">+------------+-------+---------+</text>
  <text class="t white" x="30" y="316">  Bash</text>
  <text class="t yellow" x="190" y="316">5</text>
  <text class="t dim" x="235" y="316">Built-in</text>
  <text class="t white" x="30" y="332">  Read</text>
  <text class="t yellow" x="190" y="332">1</text>
  <text class="t dim" x="235" y="332">Built-in</text>
  <text class="t dim" x="30" y="348">+------------+-------+---------+</text>

  <!-- Cache Efficiency -->
  <text class="t dim" x="155" y="374">-----</text>
  <text class="t cyan" x="198" y="374">Cache Efficiency</text>
  <text class="t dim" x="345" y="374">-----</text>

  <text class="t white" x="30" y="398">Cache Hit Rate:</text>
  <rect x="160" y="386" width="200" height="16" fill="#161b22" rx="3"/>
  <rect x="160" y="386" width="142" height="16" fill="#4ade80" rx="3"/>
  <rect x="302" y="386" width="58" height="16" fill="#22d3ee" opacity="0.4" rx="3"/>
  <text class="t cyan" x="375" y="398">70.8%</text>

  <!-- Sessions header -->
  <text class="t white" x="240" y="426" font-weight="bold">Sessions</text>

  <!-- Sessions table -->
  <text class="t dim" x="20" y="444">+-------+--------+----------------------------+----------+-------+</text>
  <text class="t magenta" x="20" y="460">  Time</text>
  <text class="t magenta" x="90" y="460">Duration</text>
  <text class="t magenta" x="175" y="460">Project</text>
  <text class="t magenta" x="395" y="460">Model(s)</text>
  <text class="t magenta" x="495" y="460">Cost</text>
  <text class="t dim" x="20" y="476">+-------+--------+----------------------------+----------+-------+</text>

  <text class="t dim" x="20" y="492">  15:40</text>
  <text class="t white" x="100" y="492">10s</text>
  <text class="t cyan" x="160" y="492">C--Users-pc</text>
  <text class="t white" x="395" y="492">Opus 4.6</text>
  <text class="t green" x="495" y="492">$0.97</text>

  <text class="t dim" x="20" y="508">  18:04</text>
  <text class="t white" x="90" y="508">7m 20s</text>
  <text class="t cyan" x="160" y="508">e--Coding-Projects-Open-Source</text>
  <text class="t white" x="395" y="508">Opus 4.6</text>
  <text class="t green" x="495" y="508">$0.62</text>
</svg>
